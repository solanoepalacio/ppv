# Local development environment — parachain node.
#
# First build (compiles the runtime inside Docker, ~10-20 min):
#   docker compose up -d
#
# Subsequent starts (cached, seconds):
#   docker compose up -d
#
# Once running:
#   Substrate RPC:  ws://127.0.0.1:9944
#
# Then start the frontend on the host:
#   cd web && npm install && npm run dev
#
# Tear down:
#   docker compose down -v

services:
  node:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    ports:
      - "9944:9944"
    volumes:
      - chain-data:/data
    command: >
      --chain=/chain/chain_spec.json
      --base-path=/data
      --alice
      --force-authoring
      --dev-block-time=3000
      --unsafe-force-node-key-generation
      --rpc-external
      --rpc-cors=all
      --rpc-methods=unsafe
      --rpc-port=9944
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9944' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  chain-data:
